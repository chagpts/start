<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>교육 자료 배포 게시판</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="board-page">
    <a href="posts.html" class="back-link">← 게시판 목록</a>

    <section class="board-hero materials">
      <div>
        <span class="badge">자료실</span>
        <h1>📂 교육 자료 배포 게시판</h1>
        <p>교육 자료를 공유하고 다운로드 안내를 확인하는 공간입니다. 필요한 자료는 아래 댓글로 요청할 수 있습니다.</p>
      </div>
    </section>

    <section class="info-box">
      <h2>자료 안내</h2>

      <div class="resource-list">
        <div class="resource-card">
          <h3>기초 교육 자료</h3>
          <p>처음 교육을 받는 사람을 위한 기본 자료입니다.</p>
          <span>PDF / 준비중</span>
        </div>

        <div class="resource-card">
          <h3>실습 자료</h3>
          <p>수업 중 실습에 사용하는 예제 파일입니다.</p>
          <span>ZIP / 준비중</span>
        </div>

        <div class="resource-card">
          <h3>복습 자료</h3>
          <p>교육 후 다시 확인할 수 있는 요약 자료입니다.</p>
          <span>PDF / 준비중</span>
        </div>
      </div>
    </section>

    <section class="notice-box">
      <h2>자료 요청 양식</h2>
      <pre>이름:
필요한 자료:
이메일:
요청 사유:</pre>
    </section>

    <hr />

    <section class="comment-section">
      <h2>자료 요청 / 문의</h2>
      <script src="giscus.js"></script>
    </section>
  </main>
</body>
</html>
