<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>로그인</title>

  <style>
    body {
      margin: 0;
      padding: 24px 14px;
      min-height: 100vh;
      font-family: 'Quicksand', Arial, sans-serif;
      text-align: center;
      background:
        linear-gradient(rgba(255,255,255,0.78), rgba(255,255,255,0.78)),
        url("verse.png") no-repeat center / cover;

      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 360px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255,255,255,0.9);
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }

    .primary {
      background: #6366f1;
      color: white;
    }

    .google {
      background: white;
      border: 1px solid #ccc;
    }

    .logout {
      background: #f87171;
      color: white;
    }

    #status {
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>로그인</h1>

    <input id="email" type="email" placeholder="이메일">
    <input id="password" type="password" placeholder="비밀번호">

    <button id="signupBtn" class="primary">회원가입</button>
    <button id="loginBtn" class="primary">로그인</button>
    <button id="googleLoginBtn" class="google">Google로 로그인</button>
    <button id="logoutBtn" class="logout">로그아웃</button>

    <p id="status">대기 중...</p>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
const firebaseConfig = {
  apiKey: "AIzaSyBlCm22OspcPACpLLi2xLdDG4vmIFD_yoQ",
  authDomain: "ai-acct.firebaseapp.com",
  projectId: "ai-acct",
  storageBucket: "ai-acct.firebasestorage.app",
  messagingSenderId: "393212959481",
  appId: "1:393212959481:web:f3bf9e829e03fe69d32028",
  measurementId: "G-1LTYJMMDWZ"
};


    firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();

    const email = document.getElementById("email");
    const password = document.getElementById("password");
    const status = document.getElementById("status");

    // 회원가입
    document.getElementById("signupBtn").onclick = async () => {
      try {
        await auth.createUserWithEmailAndPassword(email.value, password.value);
        status.textContent = "회원가입 성공!";
      } catch (e) {
        status.textContent = e.message;
      }
    };

    // 로그인 → 페이지 이동
    document.getElementById("loginBtn").onclick = async () => {
      try {
        await auth.signInWithEmailAndPassword(email.value, password.value);
        status.textContent = "로그인 성공!";
        window.location.href = "index1.html";
      } catch (e) {
        status.textContent = e.message;
      }
    };

    // Google 로그인 → 페이지 이동
    document.getElementById("googleLoginBtn").onclick = async () => {
      try {
        await auth.signInWithPopup(provider);
        status.textContent = "Google 로그인 성공!";
        window.location.href = "index1.html";
      } catch (e) {
        status.textContent = e.message;
      }
    };

    // 로그아웃
    document.getElementById("logoutBtn").onclick = async () => {
      await auth.signOut();
      status.textContent = "로그아웃됨";
    };

    // 이미 로그인 상태면 자동 이동
    auth.onAuthStateChanged((user) => {
      if (user) {
        window.location.href = "index1.html";
      }
    });
  </script>
</body>
</html>
